<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群馬県 人口動態ダッシュボード</title>
  <meta name="description" content="群馬県移動人口調査（月次）のオープンデータを可視化したダッシュボード">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/population.js"></script>
  <script src="data/gunma.geojson.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #f4f5f7;
      --card:         #ffffff;
      --border:       #e2e5ea;
      --text:         #111827;
      --text-muted:   #6b7280;
      --accent:       #1d4ed8;
      --accent-light: #dbeafe;
      --red:          #dc2626;
      --blue:         #2563eb;
      --green:        #16a34a;
      --orange:       #ea580c;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', Meiryo, sans-serif; font-size: 14px; line-height: 1.5; }

    /* Header */
    .header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-title  { font-size: 17px; font-weight: 800; letter-spacing: -.4px; }
    .header-sub    { font-size: 11px; color: var(--text-muted); }
    .header-meta   { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.6; }

    /* Filter bar */
    .filter-bar {
      display: flex; align-items: center; gap: 10px;
      background: white; border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-bar label { font-size: 11px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .filter-bar select {
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; background: var(--card); color: var(--text);
    }

    /* Main */
    .main { max-width: 1200px; margin: 0 auto; padding: 20px 16px 40px; }

    /* Cards */
    .summary-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 20px; align-items: start; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 860px) { .summary-row { grid-template-columns: 1fr; } }
    @media (max-width: 700px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    .gender-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; border-top: 3px solid var(--accent); min-width: 180px;
    }
    .gender-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .gender-donut-wrap { position: relative; height: 130px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; border-top: 3px solid var(--accent);
    }
    .stat-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .stat-card .sub-val { font-size: 12px; margin-top: 4px; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    /* Section layout */
    .section { margin-bottom: 20px; }
    .row { display: grid; gap: 16px; margin-bottom: 16px; }
    .row-1 { grid-template-columns: 1fr; }
    .row-2 { grid-template-columns: 1fr 1fr; }
    .row-2-3 { grid-template-columns: 2fr 1fr; }
    @media (max-width: 860px) { .row-2, .row-2-3 { grid-template-columns: 1fr; } }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px;
    }
    .card-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--text-muted); margin-bottom: 14px;
    }
    .chart-wrap { position: relative; height: 260px; }
    .chart-wrap-lg { position: relative; height: 300px; }
    .chart-wrap-sm { position: relative; height: 220px; }

    /* Map */
    #map-pop { height: 360px; border-radius: 8px; z-index: 0; }
    .leaflet-pane { z-index: 1 !important; }
    .leaflet-control { z-index: 2 !important; }
    .leaflet-top, .leaflet-bottom { z-index: 2 !important; }

    /* Toggle buttons */
    .chart-toggle-btns { display: flex; gap: 2px; }
    .card-title-row {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
      margin-bottom: 14px;
    }
    .card-title-row .card-title { margin-bottom: 0; }
    .toggle-btn {
      padding: 3px 10px; font-size: 11px; font-weight: 600;
      border: 1px solid var(--border); background: none;
      border-radius: 6px; cursor: pointer; color: var(--text-muted);
      transition: all .15s;
    }
    .toggle-btn:hover { color: var(--accent); border-color: var(--accent); }
    .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Map legend */
    .map-legend { display: flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 11px; color: var(--text-muted); flex-wrap: wrap; }

    /* Source */
    .source { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
    .source a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-icon">👥</div>
      <div>
        <div class="header-title">群馬県 人口動態ダッシュボード</div>
        <div class="header-sub">移動人口調査（月次）オープンデータ</div>
      </div>
    </div>
    <div class="header-meta" id="header-month"></div>
  </div>
</header>

<div class="main">
  <!-- Filter Bar -->
  <div class="filter-bar">
    <label>表示月：</label>
    <select id="month-select"></select>
    <label>市区町村：</label>
    <select id="city-select"></select>
    <div style="margin-left:auto;font-size:11px;color:var(--text-muted)" id="data-range"></div>
  </div>
  <!-- Summary Cards -->
  <div class="summary-row">
    <div class="summary-grid">
      <div class="stat-card">
        <div class="label" id="label-pop">総人口（県計）</div>
        <div class="value" id="card-pop">–</div>
        <div class="sub-val" id="card-pop-sub"></div>
      </div>
      <div class="stat-card">
        <div class="label">前月比 増減</div>
        <div class="value" id="card-change">–</div>
        <div class="sub-val" id="card-change-sub"></div>
      </div>
      <div class="stat-card">
        <div class="label">転入超過数</div>
        <div class="value" id="card-net">–</div>
        <div class="sub-val" id="card-net-sub"></div>
      </div>
      <div class="stat-card">
        <div class="label">世帯数</div>
        <div class="value" id="card-hh">–</div>
        <div class="sub-val" id="card-hh-sub"></div>
      </div>
    </div>
    <!-- Gender Donut -->
    <div class="gender-card">
      <div class="label">男女比</div>
      <div class="gender-donut-wrap"><canvas id="chart-gender"></canvas></div>
      <div id="gender-legend" style="font-size:11px;text-align:center;margin-top:6px;color:var(--text-muted)"></div>
    </div>
  </div>

  <!-- Trend -->
  <div class="row row-1">
    <div class="card">
      <div class="card-title-row">
        <span class="card-title">人口推移</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <div class="chart-toggle-btns">
            <button class="toggle-btn" id="btn-range-12" onclick="setTrendRange(12)">1年</button>
            <button class="toggle-btn" id="btn-range-36" onclick="setTrendRange(36)">3年</button>
            <button class="toggle-btn" id="btn-range-60" onclick="setTrendRange(60)">5年</button>
            <button class="toggle-btn active" id="btn-range-0" onclick="setTrendRange(0)">全期間</button>
          </div>
          <div class="chart-toggle-btns">
            <button class="toggle-btn active" id="btn-trend-pop" onclick="setTrendMode('pop')">総人口</button>
            <button class="toggle-btn" id="btn-trend-change" onclick="setTrendMode('change')">前月増減</button>
            <button class="toggle-btn" id="btn-trend-vital" onclick="setTrendMode('vital')">自然・社会増減</button>
            <button class="toggle-btn" id="btn-trend-hh" onclick="setTrendMode('hh')">世帯数</button>
          </div>
        </div>
      </div>
      <div class="chart-wrap-lg"><canvas id="chart-trend"></canvas></div>
    </div>
  </div>

  <!-- Map + Migration -->
  <div class="row row-2">
    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:8px">
        市区町村別マップ
        <div class="toggle-group" style="margin:0;margin-left:auto">
          <button class="toggle-btn active" id="btn-map-pop" onclick="setMapMode('pop')">人口</button>
          <button class="toggle-btn" id="btn-map-net" onclick="setMapMode('net')">転入超過</button>
        </div>
      </div>
      <div id="map-pop"></div>
      <div class="map-legend" id="map-legend-pop">
        <span>少</span>
        <div style="width:16px;height:10px;background:#e0f2fe;border:1px solid #ccc"></div>
        <div style="width:16px;height:10px;background:#7dd3fc"></div>
        <div style="width:16px;height:10px;background:#0ea5e9"></div>
        <div style="width:16px;height:10px;background:#0369a1"></div>
        <div style="width:16px;height:10px;background:#0c4a6e"></div>
        <span>多</span>
      </div>
      <div class="map-legend" id="map-legend-net" style="display:none">
        <span>転出超</span>
        <div style="width:16px;height:10px;background:#fca5a5"></div>
        <div style="width:16px;height:10px;background:#f87171"></div>
        <div style="width:16px;height:10px;background:#d4d4d4;border:1px solid #ccc"></div>
        <div style="width:16px;height:10px;background:#86efac"></div>
        <div style="width:16px;height:10px;background:#16a34a"></div>
        <span>転入超</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">転入・転出バランス（市区町村別）</div>
      <div class="chart-wrap-lg" id="chart-migration-wrap"><canvas id="chart-migration"></canvas></div>
      <p id="chart-migration-msg" style="display:none;padding:16px 0;color:var(--text-muted);font-size:12px">転入・転出データがありません</p>
    </div>
  </div>

  <!-- Natural vs Social -->
  <div class="row row-1">
    <div class="card">
      <div class="card-title">自然増減・社会増減 内訳（主要市）</div>
      <div class="chart-wrap"><canvas id="chart-vital"></canvas></div>
      <p id="chart-vital-msg" style="display:none;padding:16px 0;color:var(--text-muted);font-size:12px">自然・社会増減データがありません</p>
    </div>
  </div>

  <div class="source">
    出典：<a href="https://toukei.pref.gunma.jp/idj/" target="_blank">群馬県移動人口調査</a>（群馬県総務部統計課）／
    地図：<a href="https://nlftp.mlit.go.jp/ksj/" target="_blank">国土数値情報</a>（国土交通省）・<a href="https://github.com/niiyz/JapanCityGeoJson" target="_blank">JapanCityGeoJson</a>
  </div>
</div>

<script>
// =====================================================================
//  Helpers
// =====================================================================
const fmt  = n => n == null ? '–' : n.toLocaleString('ja-JP');
const fmtM = ym => `${ym.slice(0,4)}年${parseInt(ym.slice(4),10)}月`;
const sign = n => n > 0 ? `+${fmt(n)}` : fmt(n);
const cls  = n => n > 0 ? 'pos' : n < 0 ? 'neg' : '';

// =====================================================================
//  State
// =====================================================================
let currentMonth, trendMode = 'pop', trendRange = 0, mapMode = 'pop', currentCity = null;
let leafletMap = null, geojsonLayer = null;
const charts = {};

function initMonthSelect() {
  const D   = window.POP_DATA;
  const sel = document.getElementById('month-select');
  [...D.months].reverse().forEach(ym => {
    const o = document.createElement('option');
    o.value = ym; o.textContent = fmtM(ym);
    sel.appendChild(o);
  });
  currentMonth = D.meta.latest;
  sel.value    = currentMonth;
  sel.addEventListener('change', () => { currentMonth = sel.value; renderAll(); });

  document.getElementById('header-month').textContent = `${fmtM(currentMonth)} 現在`;
  document.getElementById('data-range').textContent =
    `データ期間: ${fmtM(D.months[0])} ～ ${fmtM(D.months[D.months.length-1])}`;
}

function initCitySelect() {
  const D   = window.POP_DATA;
  const sel = document.getElementById('city-select');
  const all = document.createElement('option');
  all.value = ''; all.textContent = '全県';
  sel.appendChild(all);
  Object.keys(D.cities).forEach(name => {
    const o = document.createElement('option');
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    currentCity = sel.value || null;
    renderAll();
  });
}

// =====================================================================
//  Cards
// =====================================================================
function renderCards() {
  const D   = window.POP_DATA;
  const src = currentCity ? D.cities[currentCity] : D.prefecture;
  const d   = src[currentMonth];
  const months = D.months;
  const prevIdx = months.indexOf(currentMonth) - 1;
  const prev    = prevIdx >= 0 ? src[months[prevIdx]] : null;
  document.getElementById('label-pop').textContent = `総人口（${currentCity || '県計'}）`;

  if (!d) return;

  document.getElementById('card-pop').textContent  = fmt(d.pop);
  document.getElementById('card-pop-sub').innerHTML =
    `<span class="${cls(d.change)}">${sign(d.change)}人 前月比</span>`;

  const nat = d.births - d.deaths;
  document.getElementById('card-change').textContent = sign(d.change);
  document.getElementById('card-change-sub').innerHTML =
    `自然: <span class="${cls(nat)}">${sign(nat)}</span> ／ 社会: <span class="${cls(d.inflow-d.outflow)}">${sign(d.inflow-d.outflow)}</span>`;

  const net = d.inflow - d.outflow;
  document.getElementById('card-net').innerHTML =
    `<span class="${cls(net)}">${sign(net)}</span>`;
  document.getElementById('card-net-sub').textContent =
    `転入 ${fmt(d.inflow)} ／ 転出 ${fmt(d.outflow)}`;

  document.getElementById('card-hh').textContent = fmt(d.households);
  document.getElementById('card-hh-sub').innerHTML =
    prev ? `<span class="${cls(d.hhChange)}">${sign(d.hhChange)} 世帯 前月比</span>` : '';

  document.getElementById('header-month').textContent = `${fmtM(currentMonth)} 現在`;
}

// =====================================================================
//  Trend Chart
// =====================================================================
function setTrendRange(n) {
  trendRange = n;
  [0, 12, 36, 60].forEach(r => {
    document.getElementById(`btn-range-${r}`).classList.toggle('active', r === n);
  });
  renderTrend();
}

function setTrendMode(mode) {
  trendMode = mode;
  ['pop','change','vital','hh'].forEach(m => {
    document.getElementById(`btn-trend-${m}`).classList.toggle('active', m === mode);
  });
  renderTrend();
}

function renderTrend() {
  const D      = window.POP_DATA;
  const allMonths = D.months;
  const sliced = trendRange > 0 ? allMonths.slice(-trendRange) : allMonths;
  const months = sliced;
  const labels = months.map(fmtM);
  const src    = currentCity ? D.cities[currentCity] : D.prefecture;
  const pref   = months.map(ym => src[ym]);

  if (charts.trend) charts.trend.destroy();
  const ctx = document.getElementById('chart-trend').getContext('2d');

  if (trendMode === 'pop') {
    charts.trend = new Chart(ctx, { type: 'line', data: {
      labels,
      datasets: [{
        label: '総人口', data: pref.map(d => d?.pop),
        borderColor: '#0f766e', backgroundColor: 'rgba(15,118,110,.12)',
        fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2
      }]
    }, options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 12, font: { size: 10 } } },
        y: { ticks: { callback: v => `${(v/10000).toFixed(0)}万`, font: { size: 10 } } }
      }
    }});
  } else if (trendMode === 'change') {
    charts.trend = new Chart(ctx, { type: 'bar', data: {
      labels,
      datasets: [{
        label: '前月増減', data: pref.map(d => d?.change),
        backgroundColor: pref.map(d => (d?.change ?? 0) >= 0 ? 'rgba(22,163,74,.7)' : 'rgba(220,38,38,.7)'),
        borderRadius: 2
      }]
    }, options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 12, font: { size: 10 } } },
        y: { ticks: { font: { size: 10 } } }
      }
    }});
  } else if (trendMode === 'hh') {
    charts.trend = new Chart(ctx, { type: 'line', data: {
      labels,
      datasets: [
        { label: '世帯数', data: pref.map(d => d?.households),
          borderColor: '#7c3aed', backgroundColor: 'rgba(124,58,237,.1)',
          fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2, yAxisID: 'y' },
        { label: '世帯増減', data: pref.map(d => d?.hhChange),
          borderColor: '#f59e0b', backgroundColor: 'transparent',
          tension: 0.3, pointRadius: 2, borderWidth: 1.5, borderDash: [4,3], yAxisID: 'y2' }
      ]
    }, options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { font: { size: 11 } } } },
      scales: {
        x: { ticks: { maxTicksLimit: 12, font: { size: 10 } } },
        y:  { position: 'left',  ticks: { callback: v => `${(v/10000).toFixed(1)}万`, font: { size: 10 } } },
        y2: { position: 'right', grid: { drawOnChartArea: false },
              ticks: { font: { size: 10 } }, title: { display: true, text: '増減', font: { size: 10 } } }
      }
    }});
  } else { // vital
    charts.trend = new Chart(ctx, { type: 'bar', data: {
      labels,
      datasets: [
        { label: '自然増減', data: pref.map(d => d && d.births !== null ? d.births - d.deaths : null),
          backgroundColor: 'rgba(239,68,68,.7)', stack: 'a', borderRadius: 2 },
        { label: '社会増減', data: pref.map(d => d && d.inflow !== null ? d.inflow - d.outflow : null),
          backgroundColor: 'rgba(37,99,235,.7)', stack: 'b', borderRadius: 2 }
      ]
    }, options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { font: { size: 11 } } } },
      scales: {
        x: { ticks: { maxTicksLimit: 12, font: { size: 10 } } },
        y: { ticks: { font: { size: 10 } } }
      }
    }});
  }
}

// =====================================================================
//  Map
// =====================================================================
function setMapMode(mode) {
  mapMode = mode;
  ['pop','net'].forEach(m => {
    document.getElementById(`btn-map-${m}`).classList.toggle('active', m === mode);
  });
  document.getElementById('map-legend-pop').style.display = mode === 'pop' ? 'flex' : 'none';
  document.getElementById('map-legend-net').style.display = mode === 'net' ? 'flex' : 'none';
  renderMap();
}

function getPopColor(ratio) {
  if (ratio > 0.6) return '#0c4a6e';
  if (ratio > 0.4) return '#0369a1';
  if (ratio > 0.2) return '#0ea5e9';
  if (ratio > 0.05) return '#7dd3fc';
  return '#e0f2fe';
}

function getNetColor(net, absMax) {
  if (absMax === 0) return '#d4d4d4';
  const r = net / absMax;
  if (r > 0.3) return '#16a34a';
  if (r > 0.05) return '#86efac';
  if (r >= -0.05) return '#d4d4d4';
  if (r >= -0.3) return '#f87171';
  return '#fca5a5';
}

function renderMap() {
  if (typeof L === 'undefined' || !window.GUNMA_GEOJSON) return;
  const D      = window.POP_DATA;
  const cities = D.cities;

  const vals = Object.keys(cities).map(name => {
    const d = cities[name][currentMonth];
    if (!d) return 0;
    return mapMode === 'pop' ? d.pop : (d.inflow - d.outflow);
  });
  const maxPop = Math.max(1, ...vals.filter(v => v > 0));
  const absMax = Math.max(1, ...vals.map(Math.abs));

  if (!leafletMap) {
    leafletMap = L.map('map-pop', { zoomControl: true })
      .setView([36.55, 138.95], 9);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 15
    }).addTo(leafletMap);
  }

  if (geojsonLayer) { geojsonLayer.remove(); geojsonLayer = null; }

  geojsonLayer = L.geoJSON(window.GUNMA_GEOJSON, {
    style: feature => {
      const name = feature.properties.name;
      const d    = cities[name]?.[currentMonth];
      let fill = '#e0e0e0';
      let opacity = 0.3;
      if (d) {
        opacity = 0.8;
        if (mapMode === 'pop') {
          fill = getPopColor(d.pop / maxPop);
        } else {
          fill = getNetColor(d.inflow - d.outflow, absMax);
        }
      }
      const isSelected = name === currentCity;
      return { fillColor: fill, fillOpacity: opacity, color: isSelected ? '#f59e0b' : '#888', weight: isSelected ? 2.5 : 0.7, opacity: 1 };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.name;
      const d    = cities[name]?.[currentMonth];
      layer.on('mouseover', function(e) {
        this.setStyle({ weight: 2.5, color: '#333' });
        if (!d) { this.bindTooltip(`<strong>${name}</strong>: データなし`, { sticky: true }).openTooltip(e.latlng); return; }
      const net = d.inflow != null ? d.inflow - d.outflow : null;
        const nat = d.births != null ? d.births - d.deaths : null;
        this.bindTooltip(
          `<strong>${name}</strong><br>人口: ${fmt(d.pop)} 人<br>前月比: <span style="color:${d.change>=0?'#16a34a':'#dc2626'}">${sign(d.change)}</span>` +
          (nat != null ? `<br>自然増減: ${sign(nat)} ／ 社会増減: ${sign(net)}` : ''),
          { sticky: true }
        ).openTooltip(e.latlng);
      });
      layer.on('mouseout', function() {
        geojsonLayer.resetStyle(this); this.closeTooltip();
      });
      layer.on('click', function() {
        currentCity = currentCity === name ? null : name;
        document.getElementById('city-select').value = currentCity || '';
        renderAll();
      });
    }
  }).addTo(leafletMap);
}

// =====================================================================
//  Migration Bar Chart
// =====================================================================
function renderMigration() {
  const D      = window.POP_DATA;
  const cities = D.cities;

  const data = Object.keys(cities)
    .map(name => {
      const d = cities[name][currentMonth];
      return d && d.inflow != null ? { name, net: d.inflow - d.outflow, inflow: d.inflow, outflow: d.outflow } : null;
    })
    .filter(Boolean)
    .sort((a, b) => b.net - a.net);

  if (charts.migration) charts.migration.destroy();
  const ctx = document.getElementById('chart-migration').getContext('2d');
  const migMsg = document.getElementById('chart-migration-msg');
  if (!data.length) {
    document.getElementById('chart-migration').style.display = 'none';
    migMsg.style.display = 'block';
    return;
  }
  document.getElementById('chart-migration').style.display = '';
  migMsg.style.display = 'none';
  document.getElementById('chart-migration-wrap').style.height = (data.length * 24 + 50) + 'px';
  charts.migration = new Chart(ctx, { type: 'bar',
    data: {
      labels: data.map(d => d.name),
      datasets: [{
        label: '転入超過数',
        data: data.map(d => d.net),
        backgroundColor: data.map(d => d.net >= 0 ? 'rgba(22,163,74,.75)' : 'rgba(220,38,38,.75)'),
        borderRadius: 3
      }]
    },
    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: item => {
          const d = data[item.dataIndex];
          return [`転入超過: ${sign(item.raw)}人`, `転入: ${fmt(d.inflow)} ／ 転出: ${fmt(d.outflow)}`];
        }}}
      },
      scales: {
        x: { ticks: { font: { size: 10 } } },
        y: {
          afterFit(scale) { scale.width = 80; },
          ticks: { font: { size: 10 }, autoSkip: false }
        }
      }
    }
  });
}

// =====================================================================
//  Vital Statistics Bar
// =====================================================================
function renderVital() {
  const D      = window.POP_DATA;
  const cities = D.cities;

  // 主要12市のみ（人口降順）
  const data = Object.keys(cities)
    .map(name => {
      const d = cities[name][currentMonth];
      return d && d.births != null ? { name, pop: d.pop, nat: d.births - d.deaths, soc: d.inflow - d.outflow } : null;
    })
    .filter(Boolean)
    .sort((a, b) => b.pop - a.pop)
    .slice(0, 12);

  if (charts.vital) charts.vital.destroy();
  const ctx = document.getElementById('chart-vital').getContext('2d');
  const vitMsg = document.getElementById('chart-vital-msg');
  if (!data.length) {
    document.getElementById('chart-vital').style.display = 'none';
    vitMsg.style.display = 'block';
    return;
  }
  document.getElementById('chart-vital').style.display = '';
  vitMsg.style.display = 'none';
  charts.vital = new Chart(ctx, { type: 'bar',
    data: {
      labels: data.map(d => d.name),
      datasets: [
        { label: '自然増減（出生-死亡）', data: data.map(d => d.nat),
          backgroundColor: 'rgba(239,68,68,.75)', borderRadius: 3 },
        { label: '社会増減（転入-転出）', data: data.map(d => d.soc),
          backgroundColor: 'rgba(37,99,235,.75)', borderRadius: 3 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { font: { size: 11 } } } },
      scales: {
        x: { ticks: { font: { size: 11 } } },
        y: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

// =====================================================================
//  Gender Donut
// =====================================================================
function renderGender() {
  const D   = window.POP_DATA;
  const src = currentCity ? D.cities[currentCity] : D.prefecture;
  const d   = src[currentMonth];
  if (!d) return;
  if (charts.gender) charts.gender.destroy();
  const male   = d.male   || 0;
  const female = d.female || 0;
  const total  = male + female || 1;
  const mp = (male   / total * 100).toFixed(1);
  const fp = (female / total * 100).toFixed(1);
  charts.gender = new Chart(
    document.getElementById('chart-gender').getContext('2d'),
    { type: 'doughnut',
      data: {
        labels: ['男', '女'],
        datasets: [{ data: [male, female],
          backgroundColor: ['#3b82f6','#ec4899'],
          borderWidth: 0, hoverOffset: 4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: {
            label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)}人 (${(ctx.raw/total*100).toFixed(1)}%)`
          }}
        }
      }
    }
  );
  document.getElementById('gender-legend').innerHTML =
    `<span style="color:#3b82f6">●</span> 男 ${mp}%　<span style="color:#ec4899">●</span> 女 ${fp}%`;
}

// =====================================================================
//  Render All
// =====================================================================
function renderAll() {
  document.getElementById('header-month').textContent = `${fmtM(currentMonth)} 現在`;
  renderCards();
  renderGender();
  renderTrend();
  renderMap();
  renderMigration();
  renderVital();
}

// =====================================================================
//  Init
// =====================================================================
window.addEventListener('load', () => {
  if (!window.POP_DATA) { document.body.innerHTML = '<p style="padding:2em">データ読み込みエラー</p>'; return; }
  initMonthSelect();
  initCitySelect();
  renderAll();
});
</script>
</body>
